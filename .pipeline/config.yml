general:
  buildTool: maven

stages:
  Build:
    mavenExecuteStaticCodeChecks: true

  Compliance:
    sonarExecuteScan: true
    containerOptions:
      dockerOptions: "-u 0"   # 🔥 IMPORTANT FIX
    sonarProperties:
      sonar.java.binaries: "target/classes"

steps:
  mavenExecute:
    goals: "clean install"

general:
  buildTool: maven

stages:
  Build:
    mavenExecuteStaticCodeChecks: false

  Compliance:
    runFirst: mavenExecute   # 👈 VERY IMPORTANT

steps:
  mavenExecute:
    goals: "clean install"

  sonarExecuteScan:
    serverUrl: "https://sonarcloud.io"
    organization: "venkat2525"
    projectKey: "Venkat2525_spring-mvc-app"
    additionalProperties:
      sonar.sources: "src/main/java"
      sonar.exclusions: "**/*.sh,**/*.yaml,**/*.yml,**/piper/**"
      sonar.java.binaries: "target/classes"
general:
  buildTool: maven
  containerOptions:
    dockerOptions: "-u 0"   # ✅ MUST be here (GLOBAL)

stages:
  Build:
    mavenExecuteStaticCodeChecks: true

  Compliance:
    sonarExecuteScan: true
    sonarProperties:
      sonar.java.binaries: "target/classes"

steps:
  mavenExecute:
    goals: "clean install"
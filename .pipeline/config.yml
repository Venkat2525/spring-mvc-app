general:
  buildTool: maven

stages:
  Build:
    mavenExecuteStaticCodeChecks: true

  Compliance:
    sonarExecuteScan: true
    sonarExecuteQualityGate:
      failOnQualityGateFailure: true

steps:
  sonarExecuteScan:
    parameters:
      waitForQualityGate: true

  mavenExecute:
    goals: "clean install"
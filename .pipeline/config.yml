general:
  buildTool: maven
  containerOptions:
    sonar:
      dockerOptions: "-u root"

stages:
  Build:
    mavenExecuteStaticCodeChecks: true

  Compliance:
    sonarExecuteScan: true
    sonarProperties:
      sonar.java.binaries: "target/classes"

steps:
  mavenExecute:
    goals: "clean install"
    stashIncludes: "target/classes/**/*.class"
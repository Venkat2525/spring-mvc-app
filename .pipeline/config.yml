general:
  buildTool: maven

stages:
  Build:
    mavenExecuteStaticCodeChecks: true

  Compliance:
    sonarExecuteScan: true
    containerOptions:
      dockerOptions: "-u root"
    sonarProperties:
      sonar.java.binaries: "target/classes"

steps:
  mavenExecute:
    goals: "clean install"
    stashIncludes: "target/**"
    stashExcludes: ""
general:
  buildTool: maven

stages:
  Build:
    mavenExecuteStaticCodeChecks: false

  Additional Unit Tests:
    run: true   # ✅ Enables this stage

steps:
  # 🔹 Build Stage → Runs only normal unit tests
  mavenExecute:
    goals: "clean verify -Dtest=!*IT"

  # 🔹 Additional Unit Tests Stage → Runs IT tests
  additionalUnitTests:
    command: "mvn test -Dtest=*IT"

  # 🔹 Deployment
  cloudFoundryDeploy:
    cfApiEndpoint: "https://api.cf.ap21.hana.ondemand.com"
    cfOrg: "d38f4a1dtrial"
    cfSpace: "dev"
    cfAppName: "spring-mvc-app"
    deployType: "standard"